name: Run E2E Backend + Frontend Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    name: E2E (${{ matrix.configuration }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - configuration: default-jit
            registration_disabled: ''
          - configuration: registration-policy-sso
            registration_disabled: sso
    env:
      CYPRESS_TESTING: true
      NODE_ENV: test
      REGISTRATION_DISABLED: ${{ matrix.registration_disabled }}
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
      ldap:
        image: rroemhild/test-openldap
        ports:
          - 10389:10389
      splunk:
        image: splunk/splunk
        volumes:
          - /$(pwd)/test/configs/splunk/server.conf:/etc/system/local/server.conf
        ports:
          - 8089:8089
        env:
          SPLUNK_START_ARGS: --accept-license
          SPLUNK_GENERAL_TERMS: --accept-sgt-current-at-splunk-com
          SPLUNK_PASSWORD: Valid_password!

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          check-latest: true
          cache: 'yarn'

      - name: Install project dependencies
        run: yarn install --frozen-lockfile

      - name: Copy .env-ci to .env
        run: cp apps/backend/test/.env-ci apps/backend/.env

      - name: Build Heimdall
        run: yarn build
        env:
          NODE_ENV: production # want to install dev deps like cypress but test against the prod build of Heimdall

      - name: Create/migrate db
        run: |
          yarn backend sequelize db:create
          yarn backend sequelize db:migrate
          yarn backend sequelize db:seed:all

      - name: Cypress run (default JIT policy)
        if: matrix.configuration == 'default-jit'
        uses: cypress-io/github-action@v7
        with:
          config: excludeSpecPattern=test/integration/registration-policy.cy.ts
          start: yarn start, yarn run cypress-test mock-json, yarn run cypress-test mock-openid
          wait-on: 'http://127.0.0.1:3000, http://127.0.0.1:3001'

      - name: Cypress run (SSO provisioning denied)
        if: matrix.configuration == 'registration-policy-sso'
        uses: cypress-io/github-action@v7
        with:
          start: yarn start, yarn run cypress-test mock-json, yarn run cypress-test mock-openid
          wait-on: 'http://127.0.0.1:3000, http://127.0.0.1:3001'
          spec: test/integration/registration-policy.cy.ts

      - name: Upload test screenshots and videos
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-recording-${{ matrix.configuration }}
          path: |
            test/screenshots
            test/videos
